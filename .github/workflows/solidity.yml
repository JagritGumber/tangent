name: solidity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: forge build + test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std
        run: forge install foundry-rs/forge-std

      - name: forge fmt --check
        run: forge fmt --check
        continue-on-error: true

      - name: forge build --sizes
        run: forge build --sizes

      - name: forge test -vv
        run: forge test -vv

      - name: forge test --gas-report
        run: forge test --gas-report
        continue-on-error: true

      - name: forge coverage
        run: forge coverage --report summary
        continue-on-error: true

      - name: Flatten contracts for SCP upload
        run: |
          mkdir -p flat
          forge flatten src/AccountManager.sol --output flat/AccountManager.flat.sol
          forge flatten src/USDCVault.sol --output flat/USDCVault.flat.sol
          forge flatten src/MarketRegistry.sol --output flat/MarketRegistry.flat.sol
          forge flatten src/OrderBook.sol --output flat/OrderBook.flat.sol
          forge flatten src/SettlementEngine.sol --output flat/SettlementEngine.flat.sol
          forge flatten src/LiquidationKeeper.sol --output flat/LiquidationKeeper.flat.sol

      - name: Bundle deploy artifacts
        run: |
          mkdir -p deploy-artifacts
          cp -r flat deploy-artifacts/
          cp out/AccountManager.sol/AccountManager.json deploy-artifacts/AccountManager.compiled.json
          cp out/USDCVault.sol/USDCVault.json deploy-artifacts/USDCVault.compiled.json
          cp out/MarketRegistry.sol/MarketRegistry.json deploy-artifacts/MarketRegistry.compiled.json
          cp out/OrderBook.sol/OrderBook.json deploy-artifacts/OrderBook.compiled.json
          cp out/SettlementEngine.sol/SettlementEngine.json deploy-artifacts/SettlementEngine.compiled.json
          cp out/LiquidationKeeper.sol/LiquidationKeeper.json deploy-artifacts/LiquidationKeeper.compiled.json

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tangent-deploy-artifacts
          path: deploy-artifacts/
          retention-days: 30
